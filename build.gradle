plugins {
    id 'java'
    id 'application'
}

application {
    mainClass = 'org.htw.prog2.aufgabe2.DICOMDiagnostics'
}


tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

group 'org.htw.prog2.aufgabe2'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
    maven{
        url "https://gazelle.ihe.net/nexus/content/repositories/releases/"
    }
}

test{
    workingDir = new File('data/')
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main']
        }
    }
    test {
        java {
            srcDirs = ['src/test']
        }
    }
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.7.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.7.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation 'com.pixelmed:dicom:20120929'
}

test {
    useJUnitPlatform()
}
